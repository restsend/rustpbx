<div x-data='destinationSelector({
    apiPrefix: {{ api_prefix | default("/api") | tojson }},
    queueItems: {{ queue_items | default([]) | tojson }},
    ivrItems: {{ ivr_items | default([]) | tojson }},
    initialType: {{ initial_type | default("uri") | tojson }},
    initialValue: {{ initial_value | default("") | tojson }}
})' class="space-y-3">
  <!-- Type selector (hidden when only one type is allowed) -->
  <div class="flex flex-wrap gap-2 text-xs font-semibold" x-show="allowedTypes.length > 1">
    <label x-show="allowedTypes.includes('extension')"
      class="inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-slate-600 transition cursor-pointer"
      :class="targetType === 'extension' ? 'border-sky-200 bg-sky-50 text-sky-700 shadow-sm' : 'border-slate-200 hover:border-slate-300'">
      <input type="radio" class="h-4 w-4 border-slate-300 text-sky-600"
        :checked="targetType === 'extension'" @change="setType('extension')">
      <span>{{ "destination_selector.extension" | t }}</span>
    </label>
    <label x-show="allowedTypes.includes('queue')"
      class="inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-slate-600 transition cursor-pointer"
      :class="targetType === 'queue' ? 'border-sky-200 bg-sky-50 text-sky-700 shadow-sm' : 'border-slate-200 hover:border-slate-300'">
      <input type="radio" class="h-4 w-4 border-slate-300 text-sky-600"
        :checked="targetType === 'queue'" @change="setType('queue')">
      <span>{{ "destination_selector.queue" | t }}</span>
    </label>
    <label x-show="allowedTypes.includes('ivr')"
      class="inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-slate-600 transition cursor-pointer"
      :class="targetType === 'ivr' ? 'border-sky-200 bg-sky-50 text-sky-700 shadow-sm' : 'border-slate-200 hover:border-slate-300'">
      <input type="radio" class="h-4 w-4 border-slate-300 text-sky-600"
        :checked="targetType === 'ivr'" @change="setType('ivr')">
      <span>{{ "destination_selector.ivr" | t }}</span>
    </label>
    <label x-show="allowedTypes.includes('voicemail')"
      class="inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-slate-600 transition cursor-pointer"
      :class="targetType === 'voicemail' ? 'border-sky-200 bg-sky-50 text-sky-700 shadow-sm' : 'border-slate-200 hover:border-slate-300'">
      <input type="radio" class="h-4 w-4 border-slate-300 text-sky-600"
        :checked="targetType === 'voicemail'" @change="setType('voicemail')">
      <span>{{ "destination_selector.voicemail" | t }}</span>
    </label>
    <label x-show="allowedTypes.includes('uri')"
      class="inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-slate-600 transition cursor-pointer"
      :class="targetType === 'uri' ? 'border-sky-200 bg-sky-50 text-sky-700 shadow-sm' : 'border-slate-200 hover:border-slate-300'">
      <input type="radio" class="h-4 w-4 border-slate-300 text-sky-600"
        :checked="targetType === 'uri'" @change="setType('uri')">
      <span>{{ "destination_selector.uri" | t }}</span>
    </label>
  </div>

  <!-- Extension: searchable dropdown -->
  <div x-show="targetType === 'extension'" x-cloak>
    <div class="relative" @click.outside="extOpen = false" x-ref="extRoot">
      <div class="relative">
        <input type="text" x-model="extQuery"
          @input="onExtInput()" @focus="extOpen = true"
          @keydown="handleKeydown($event, 'ext')"
          class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 pr-8 text-sm text-slate-700 focus:border-sky-300 focus:outline-none focus:ring-2 focus:ring-sky-200"
          placeholder="{{ "destination_selector.search_extension" | t }}">
        <svg x-show="extLoading" class="absolute right-2.5 top-2.5 h-4 w-4 animate-spin text-slate-400"
          viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </div>
      <template x-if="extOpen && extFiltered.length">
        <ul class="absolute z-30 max-h-48 w-full overflow-auto rounded-lg border border-slate-200 bg-white py-1 shadow-lg"
          :class="dropdownUp($refs.extRoot) ? 'bottom-full mb-1' : 'top-full mt-1'">
          <template x-for="(item, i) in extFiltered" :key="item.extension || i">
            <li @click="selectExt(item)"
              class="cursor-pointer px-3 py-2 text-sm"
              :class="extIndex === i ? 'bg-sky-50 text-sky-700' : 'text-slate-700 hover:bg-slate-50'">
              <span x-text="item.display_name || item.extension" class="font-medium"></span>
              <span x-show="item.display_name" class="ml-1 text-xs text-slate-400" x-text="'(' + item.extension + ')'"></span>
            </li>
          </template>
        </ul>
      </template>
      <template x-if="extOpen && !extLoading && extFiltered.length === 0">
        <div class="absolute z-30 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-400 shadow-lg"
          :class="dropdownUp($refs.extRoot) ? 'bottom-full mb-1' : 'top-full mt-1'">
          {{ "destination_selector.no_results" | t }}
        </div>
      </template>
    </div>
  </div>

  <!-- Queue: searchable dropdown -->
  <div x-show="targetType === 'queue'" x-cloak>
    <div class="relative" @click.outside="queueOpen = false" x-ref="queueRoot">
      <div class="relative cursor-pointer" @click="toggleQueue()">
        <input type="text" x-model="queueQuery" readonly
          class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 pr-8 text-sm text-slate-700 focus:border-sky-300 focus:outline-none focus:ring-2 focus:ring-sky-200 cursor-pointer"
          placeholder="{{ "destination_selector.select_queue" | t }}">
        <svg class="pointer-events-none absolute right-2.5 top-2.5 h-4 w-4 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
        </svg>
      </div>
      <template x-if="queueOpen && queueFiltered.length">
        <ul class="absolute z-30 max-h-48 w-full overflow-auto rounded-lg border border-slate-200 bg-white py-1 shadow-lg"
          :class="dropdownUp($refs.queueRoot) ? 'bottom-full mb-1' : 'top-full mt-1'">
          <template x-for="(item, i) in queueFiltered" :key="item.reference || i">
            <li @click="selectQueue(item)" @keydown="handleKeydown($event, 'queue')"
              class="cursor-pointer px-3 py-2 text-sm"
              :class="queueIndex === i ? 'bg-sky-50 text-sky-700' : 'text-slate-700 hover:bg-slate-50'">
              <span x-text="item.name" class="font-medium"></span>
              <span class="ml-1 text-xs text-slate-400" x-text="'(' + (item.reference || '') + ')'"></span>
            </li>
          </template>
        </ul>
      </template>
      <template x-if="queueOpen && queueFiltered.length === 0">
        <div class="absolute z-30 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-400 shadow-lg"
          :class="dropdownUp($refs.queueRoot) ? 'bottom-full mb-1' : 'top-full mt-1'">
          {{ "destination_selector.no_results" | t }}
        </div>
      </template>
    </div>
  </div>

  <!-- IVR: searchable dropdown -->
  <div x-show="targetType === 'ivr'" x-cloak>
    <div class="relative" @click.outside="ivrOpen = false" x-ref="ivrRoot">
      <div class="relative cursor-pointer" @click="toggleIvr()">
        <input type="text" x-model="ivrQuery" readonly
          class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 pr-8 text-sm text-slate-700 focus:border-sky-300 focus:outline-none focus:ring-2 focus:ring-sky-200 cursor-pointer"
          placeholder="{{ "destination_selector.select_ivr" | default("Select IVR...") | t }}">
        <svg class="pointer-events-none absolute right-2.5 top-2.5 h-4 w-4 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
        </svg>
      </div>
      <template x-if="ivrOpen && ivrFiltered.length">
        <ul class="absolute z-30 max-h-48 w-full overflow-auto rounded-lg border border-slate-200 bg-white py-1 shadow-lg"
          :class="dropdownUp($refs.ivrRoot) ? 'bottom-full mb-1' : 'top-full mt-1'">
          <template x-for="(item, i) in ivrFiltered" :key="item.name || i">
            <li @click="selectIvr(item)"
              class="cursor-pointer px-3 py-2 text-sm"
              :class="ivrIndex === i ? 'bg-sky-50 text-sky-700' : 'text-slate-700 hover:bg-slate-50'">
              <span x-text="item.name" class="font-medium"></span>
              <span class="ml-1 text-xs text-slate-400" x-text="'(' + (item.ivr_mode || 'tree') + ')'"></span>
            </li>
          </template>
        </ul>
      </template>
      <template x-if="ivrOpen && ivrFiltered.length === 0">
        <div class="absolute z-30 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-400 shadow-lg"
          :class="dropdownUp($refs.ivrRoot) ? 'bottom-full mb-1' : 'top-full mt-1'">
          {{ "destination_selector.no_results" | t }}
        </div>
      </template>
    </div>
  </div>

  <!-- Voicemail: text input -->
  <div x-show="targetType === 'voicemail'" x-cloak>
    <input type="text" maxlength="50"
      x-model="targetValue" @input="emitChange()"
      class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 focus:border-sky-300 focus:outline-none focus:ring-2 focus:ring-sky-200"
      placeholder="{{ "destination_selector.voicemail_extension" | default("Extension number") | t }}">
  </div>

  <!-- URI: text input -->
  <div x-show="targetType === 'uri'" x-cloak>
    <input type="text" maxlength="160"
      x-model="targetValue" @input="emitChange()"
      class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 focus:border-sky-300 focus:outline-none focus:ring-2 focus:ring-sky-200"
      placeholder="{{ "destination_selector.uri_placeholder" | default("sip:user@domain") | t }}">
  </div>
</div>
