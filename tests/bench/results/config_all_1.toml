# Minimal P2P benchmark config (no addons, no recording, no sipflow).
# bench.py injects media_proxy / recording / sipflow per scenario.
# Ports match bench.py defaults: SIP=15061, HTTP=8083.

http_addr = "0.0.0.0:8083"
log_level = "info"
media_cache_path = "./config/mediacache"
# MySQL via local proxy (macOS Tahoe Local Network Privacy workaround).
# bench.py auto-starts mysql_proxy.py (127.0.0.1:13307 -> 192.168.3.152:13306).
database_url = "mysql://root:123456@127.0.0.1:13307/bench_rustpbx_s1783482216"
rtp_start_port = 20000
rtp_end_port = 50000

[proxy]
modules = ["acl", "auth", "registrar", "call"]
addr = "0.0.0.0"
udp_port = 15061
registrar_expires = 60
media_proxy = "all"
generated_dir = "./config"
routes_files = []
trunks_files = []
ensure_user = true
acl_rules = ["allow all", "deny all"]

[[proxy.user_backends]]
type = "memory"

[[proxy.user_backends.users]]
id = 0
enabled = true
username = "bob"
password = "123456"

[[proxy.user_backends.users]]
id = 1
enabled = true
username = "alice"
password = "123456"

[console]
base_path = "/console"

[sipflow]
type = "remote"
udp_addr = "127.0.0.1:53835"
http_addr = "http://127.0.0.1:53836"
timeout_secs = 10
